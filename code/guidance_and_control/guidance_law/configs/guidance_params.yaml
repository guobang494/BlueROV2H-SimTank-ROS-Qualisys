####################### Guidance parameters #######################


path_waypoint_following: true  # this is a future flag for different path scenarios - not in use at the moment
waypoint_cycling_active: true  # if true, the scenario repeats once the vehicle reaches the last waypoint

gamma: 0.1   # [m] radius around a waypoint to define when to switch to the next target
max_position_error: 10.0  # [m] cap on (reference position - measured position)
max_angle_error_deg: 180.0  # [deg] cap on angle error for roll, pitch, yaw

waypoints:  # in NED frame
  - [0.0, 0.0, 0.4]
  - [0.0, 0.0, 0.6]
  - [0.0, 0.0, 0.2]
  - [0.3, -0.5196, 0.4]
  - [0.9, -0.5196, 0.4]
  - [1.2, 0.0, 0.4]
  - [0.9, 0.5196, 0.4]
  - [0.3, 0.5196, 0.4]
  - [0.0, 0.0, 0.4]
  - [0.3, -0.5196, 0.6]
  - [0.9, -0.5196, 0.6]
  - [1.2, 0.0, 0.6]
  - [0.9, 0.5196, 0.6]
  - [0.3, 0.5196, 0.6]
  - [0.0, 0.0, 0.6]
  - [0.0, 0.0, 0.2]
